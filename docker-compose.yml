# ============================================================
# Zowsup Dashboard — Docker Compose
# ============================================================
# Runs backend + frontend (Nginx serving the built React app).
#
# Quick start:
#   1. cp .env.example .env && nano .env    # set DASHBOARD_API_TOKEN
#   2. docker compose up --build
#
# Production:
#   docker compose -f docker-compose.yml up -d

services:

  # ── Backend Flask API ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: zowsup-dashboard-backend:latest
    container_name: zowsup-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "5000"
    ports:
      - "5000:5000"
    volumes:
      # Persist database and logs outside the container
      - ./data:/app/data
      - ./logs:/app/logs
      - ./conf:/app/conf:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend Nginx ─────────────────────────────────────────
  frontend:
    build:
      context: ./app/dashboard/frontend
      dockerfile: Dockerfile.frontend
    image: zowsup-dashboard-frontend:latest
    container_name: zowsup-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Optional: mount custom Nginx config or TLS certs
      # - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro
      []
